<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FormationVR</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{
    min-height:100vh;
    background:url('https://i.ibb.co/Q3g6TjwT/fond-linktree.png') center/cover no-repeat fixed;
    display:flex;flex-direction:column;align-items:center;
    padding:52px 20px 40px;
    font-family:'Segoe UI',sans-serif;
  }
  .logo-wrap{
    width:90px;height:90px;border-radius:50%;
    background:#000;
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    margin-bottom:16px;
    border:3px solid rgba(255,255,255,0.6);
  }
  .logo-text{color:#fff;font-size:9px;font-weight:800;letter-spacing:2px;margin-bottom:2px}
  .logo-vr{display:flex;align-items:center}
  .name{color:#fff;font-size:20px;font-weight:700;margin-bottom:6px;letter-spacing:0.5px}
  .tagline{color:rgba(255,255,255,0.88);font-size:13px;margin-bottom:36px;text-align:center;max-width:260px;line-height:1.5}
  .links{width:100%;max-width:440px;display:flex;flex-direction:column;gap:13px}
  .btn{
    display:flex;align-items:center;gap:14px;
    background:rgba(255,255,255,0.22);
    backdrop-filter:blur(8px);
    border:1.5px solid rgba(255,255,255,0.5);
    border-radius:50px;
    padding:14px 22px;
    text-decoration:none;
    color:#fff;
    font-size:15px;font-weight:600;
    transition:background 0.2s,transform 0.15s;
    position:relative;
  }
  .btn:hover{background:rgba(255,255,255,0.35);transform:scale(1.02)}
  .btn:active{transform:scale(0.98)}
  .btn .icon{
    width:34px;height:34px;border-radius:50%;
    background:rgba(255,255,255,0.25);
    display:flex;align-items:center;justify-content:center;
    font-size:17px;flex-shrink:0;
  }
  .btn .label{flex:1;text-align:center}
  .footer{margin-top:36px;color:rgba(255,255,255,0.55);font-size:11px}
</style>
</head>
<body>

<div class="logo-wrap" style="background:none;border:none">
  <img src="https://i.ibb.co/0jmqrsqn/formationvr-photo-linktree.png" alt="FormationVR" style="width:90px;height:90px;border-radius:50%;object-fit:cover">
</div>

<h1 class="name">FormationVR</h1>
<p class="tagline">Organisme de formation<br>Formez-vous autrement</p>

<div class="links">

  <a class="btn" href="https://www.formationvr.fr" target="_blank" rel="noopener">
    <span class="icon"><i class="fas fa-globe"></i></span>
    <span class="label">Notre site web</span>
  </a>

  <a class="btn" href="https://www.linkedin.com/in/formationvr/" target="_blank" rel="noopener">
    <span class="icon"><i class="fab fa-linkedin-in"></i></span>
    <span class="label">LinkedIn</span>
  </a>

  <a class="btn" href="https://www.instagram.com/formation.vr/" target="_blank" rel="noopener">
    <span class="icon"><i class="fab fa-instagram"></i></span>
    <span class="label">Instagram</span>
  </a>

  <a class="btn" href="https://www.tiktok.com/@formation.vr" target="_blank" rel="noopener">
    <span class="icon"><i class="fab fa-tiktok"></i></span>
    <span class="label">TikTok</span>
  </a>

  <a class="btn" href="https://www.facebook.com/formationvrpage" target="_blank" rel="noopener">
    <span class="icon"><i class="fab fa-facebook-f"></i></span>
    <span class="label">Facebook</span>
  </a>

</div>

<div style="margin-top:28px;width:100%;max-width:440px;display:flex;flex-direction:column;gap:10px;align-items:center">
  <div style="color:rgba(255,255,255,0.9);font-size:14px;display:flex;align-items:center;gap:8px">
    <i class="fas fa-envelope" style="font-size:13px;opacity:0.8"></i>
    <a href="mailto:contact@formationvr.fr" style="color:rgba(255,255,255,0.9);text-decoration:none">contact@formationvr.fr</a>
  </div>
  <div style="color:rgba(255,255,255,0.9);font-size:14px;display:flex;align-items:center;gap:8px">
    <i class="fas fa-phone" style="font-size:13px;opacity:0.8"></i>
    04 28 29 72 31
  </div>
  <a href="https://maps.google.com/?q=8+chemin+des+cuers+69750+Dardilly" target="_blank" rel="noopener"
     style="color:rgba(255,255,255,0.9);font-size:14px;display:flex;align-items:center;gap:8px;text-decoration:none;border-bottom:1px solid rgba(255,255,255,0.4)">
    <i class="fas fa-location-dot" style="font-size:13px;opacity:0.8"></i>
    8 chemin des Cuers, 69750 Dardilly
  </a>
</div>

<p class="footer">© 2026 FormationVR - Dardilly, Lyon</p>

</body>
</html>
